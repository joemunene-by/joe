name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Smoke-import joe binary (no .py extension)
        run: |
          python -c "
          from importlib.machinery import SourceFileLoader
          import importlib.util, sys
          loader = SourceFileLoader('joe_smoke', 'bin/joe')
          spec = importlib.util.spec_from_loader('joe_smoke', loader)
          mod = importlib.util.module_from_spec(spec)
          sys.modules['joe_smoke'] = mod
          loader.exec_module(mod)
          assert hasattr(mod, 'extract_first_tool_call')
          assert hasattr(mod, 'tool_cd')
          assert hasattr(mod, '_detect_llm')
          print('joe imports cleanly on Python', sys.version)
          "

  vscode-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: joe-vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: joe-vscode/package-lock.json
      - run: npm ci
      - run: npm run compile
