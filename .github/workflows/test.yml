name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11+ only -- joe imports tomllib (stdlib in 3.11) for macros
        # and subagents. Adding tomli as a CI-only shim isn't worth the
        # cognitive load; the Mac runs 3.9 (system) or 3.14 (Library/),
        # neither is in the matrix.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Runtime deps joe imports at module load. fastapi/uvicorn/mcp
          # only matter for joe-http / joe-mcp, but adding them is cheap
          # and lets the smoke-import in tests/conftest.py succeed.
          pip install pytest pytest-asyncio rich prompt_toolkit fastapi uvicorn mcp
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Smoke-import joe binary (no .py extension)
        run: |
          python -c "
          from importlib.machinery import SourceFileLoader
          import importlib.util, sys
          loader = SourceFileLoader('joe_smoke', 'bin/joe')
          spec = importlib.util.spec_from_loader('joe_smoke', loader)
          mod = importlib.util.module_from_spec(spec)
          sys.modules['joe_smoke'] = mod
          loader.exec_module(mod)
          assert hasattr(mod, 'extract_first_tool_call')
          assert hasattr(mod, 'tool_cd')
          assert hasattr(mod, '_detect_llm')
          print('joe imports cleanly on Python', sys.version)
          "

  vscode-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: joe-vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: joe-vscode/package-lock.json
      - run: npm ci
      - run: npm run compile
