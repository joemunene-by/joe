# Example .joe-profile.toml. Drop a copy at the root of any repo you
# want joe to treat specially. `joe init` generates this for you if you
# point it at a fresh repo.

default_coder = "qwen2.5-coder:14b"   # model to delegate code-writing to
default_base = "main"                  # base branch for /pr review
lint_cmd = "ruff check ."
test_cmd = "pytest"
build_cmd = "python3 -m build"

# Anything in context_extra is appended verbatim to the system prompt
# for any turn run with cwd inside this repo. Use it for repo-specific
# conventions, glossary, or hard rules that should never be overridden.
context_extra = """
This is a hypothetical example project. Lessons that should always apply:
  - Always run pytest after edits in src/.
  - Never touch RESULTS.md by hand; it's auto-generated by the eval script.
  - Public APIs need short docstrings explaining WHY.
"""
